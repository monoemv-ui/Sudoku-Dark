<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Dark - Pro Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bb86fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sudoku Dark">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@300&display=swap');

        :root {
            --bg: #050505;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --text: #e0e0e0;
            --card: #121212;
            --accent: #ff0266;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .bg-numbers {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15rem;
            color: rgba(187, 134, 252, 0.02);
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .container { width: 100%; max-width: 450px; padding: 20px; z-index: 10; position: relative; }

        /* Pantallas */
        #menu-screen { display: flex; flex-direction: column; gap: 20px; text-align: center; margin-top: 8vh; }
        #game-screen, #stats-screen { display: none; }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        select, input, .btn-main {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: white;
            font-weight: 600;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-main { background: var(--primary); color: black; border: none; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--secondary); color: var(--secondary); margin-top: 10px; }

        /* Estadísticas Panel */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .stats-table th { color: var(--primary); text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        .stats-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* Grid Juego */
        .header-game { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; }
        #hint-msg { color: var(--secondary); font-size: 0.8rem; text-align: center; height: 20px; font-style: italic; }
        
        .sudoku-grid {
            display: grid; grid-template-columns: repeat(9, 1fr);
            background: #444; gap: 1px; border: 2px solid #444;
            aspect-ratio: 1/1; border-radius: 8px; overflow: hidden;
        }

        .cell {
            background: #0f0f0f; display: flex; align-items: center;
            justify-content: center; font-size: 1.6rem; cursor: pointer;
            position: relative;
        }

        .cell.fixed { color: var(--secondary); font-weight: bold; }
        .cell.selected { background: #222; box-shadow: inset 0 0 8px var(--primary); }
        .cell.error { color: var(--accent) !important; animation: shake 0.4s; }
        .cell.hint-focus { animation: pulse 1.5s infinite; background: #1a2a2a; }

        /* Modo Lápiz */
        .notes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
        .notes span {
            font-size: 0.55rem;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        /* Resaltado de celdas relacionadas */
        .cell.same-group { background: #1a1a1a; }
        .cell.same-number { background: #1f1433; box-shadow: inset 0 0 6px rgba(187,134,252,0.35); }
        .cell.same-number.fixed { color: #d4aaff; }

        /* Animación grupo completado */
        @keyframes groupFlash {
            0%   { background: #0f0f0f; }
            30%  { background: #1a2e1a; box-shadow: inset 0 0 12px var(--secondary); }
            70%  { background: #1a2e1a; box-shadow: inset 0 0 8px var(--secondary); }
            100% { background: #0f0f0f; }
        }
        .cell.group-complete { animation: groupFlash 0.7s ease-out forwards; }

        @keyframes pulse { 50% { box-shadow: inset 0 0 15px var(--secondary); } }
        @keyframes shake { 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }

        /* Divisores 3x3 */
        .cell:nth-child(3n) { border-right: 2px solid #444; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #444; }

        .controls, .numpad { display: grid; gap: 8px; margin-top: 10px; }
        .controls { grid-template-columns: 1fr 1fr; }
        .numpad { grid-template-columns: repeat(5, 1fr); }
        
        .btn-small { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; cursor: pointer; }
        .btn-small.active { background: var(--primary); color: black; }
        .confetti { position: fixed; width: 8px; height: 8px; z-index: 100; border-radius: 2px; pointer-events: none; }

        /* Contador de errores */
        .error-counter {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.85rem; color: #888;
        }
        .error-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #333; border: 1px solid #555;
            transition: background 0.3s;
        }
        .error-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }

        /* Modal de game over / reanudar */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--card); border: 1px solid #444;
            border-radius: 20px; padding: 35px 30px;
            text-align: center; max-width: 320px; width: 90%;
        }
        .modal-box h2 { margin: 0 0 10px; font-size: 1.8rem; color: var(--accent); }
        .modal-box p { color: #aaa; margin: 0 0 25px; font-size: 0.95rem; }
        .modal-btn-group { display: flex; flex-direction: column; gap: 10px; }

        /* Badge "Reanudar" en menú */
        .resume-badge {
            background: #1a1a2e; border: 1px solid var(--primary);
            border-radius: 12px; padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .resume-badge:hover { box-shadow: 0 0 15px var(--primary)33; }
        .resume-badge .rb-info { text-align: left; }
        .resume-badge .rb-label { font-size: 0.65rem; color: var(--primary); letter-spacing: 1px; }
        .resume-badge .rb-detail { font-size: 0.95rem; color: var(--text); margin-top: 2px; }
        .resume-badge .rb-arrow { font-size: 1.5rem; color: var(--primary); }

        /* Stats mejoradas */
        .stats-summary {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 15px;
        }
        .stat-mini {
            background: #0f0f0f; border: 1px solid #2a2a2a;
            border-radius: 10px; padding: 12px;
            text-align: center;
        }
        .stat-mini .sm-val { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        .stat-mini .sm-label { font-size: 0.65rem; color: #666; margin-top: 2px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="bg-numbers"><div>3</div><div>7</div><div>8</div><div>1</div></div>

    <div class="container">
        <div id="menu-screen">
            <h1>Sudoku Dark</h1>

            <!-- Badge partida guardada -->
            <div id="resume-section" style="display:none;" onclick="resumeGame()">
                <div class="resume-badge">
                    <div class="rb-info">
                        <div class="rb-label">▶ PARTIDA GUARDADA</div>
                        <div class="rb-detail" id="resume-detail">Continuar...</div>
                    </div>
                    <div class="rb-arrow">›</div>
                </div>
            </div>

            <div class="glass-card">
                <label style="font-size: 0.7rem; color: #888;">PERFIL DE JUGADOR</label>
                <select id="user-select" onchange="toggleNewUser(this.value)">
                    <option value="" disabled selected>Selecciona un perfil...</option>
                    <option value="new">+ Crear nuevo perfil</option>
                </select>
                <input type="text" id="new-user-input" placeholder="Nombre del jugador..." style="display:none;">
                
                <label style="font-size: 0.7rem; color: #888; margin-top: 15px; display: block;">DIFICULTAD</label>
                <select id="diff-select">
                    <option value="42">Fácil</option>
                    <option value="34">Medio</option>
                    <option value="26">Difícil</option>
                </select>

                <button class="btn-main" onclick="initGame()" style="margin-top: 20px;">INICIAR NUEVA PARTIDA</button>
                <button class="btn-main btn-outline" onclick="showStats()">VER ESTADÍSTICAS</button>
            </div>
        </div>

        <div id="stats-screen">
            <h1 style="font-size: 2rem;">Estadísticas</h1>
            <div class="glass-card">
                <select id="stats-filter" onchange="showStats()" style="margin-bottom: 15px;">
                    <option value="42">Fácil</option>
                    <option value="34">Medio</option>
                    <option value="26">Difícil</option>
                </select>

                <!-- Resumen global de la dificultad -->
                <div class="stats-summary" id="stats-summary"></div>

                <div style="max-height: 220px; overflow-y: auto;">
                    <table class="stats-table" id="stats-body">
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Victorias</th>
                                <th>Mejor</th>
                                <th>Promedio</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <button class="btn-main btn-outline" onclick="closeStats()" style="margin-top:20px;">VOLVER</button>
            </div>
        </div>

        <div id="game-screen">
            <div class="header-game">
                <span id="display-name" style="color:var(--primary); font-weight:bold;">---</span>
                <div class="error-counter" id="error-counter">
                    <div class="error-dot" id="ed1"></div>
                    <div class="error-dot" id="ed2"></div>
                    <div class="error-dot" id="ed3"></div>
                    <div class="error-dot" id="ed4"></div>
                </div>
                <div id="timer" style="font-family: 'JetBrains Mono'; font-size: 1.6rem; color: var(--secondary);">00:00</div>
            </div>
            <div id="hint-msg">Concentración...</div>
            <div class="sudoku-grid" id="grid"></div>
            <div class="controls">
                <button class="btn-small" id="pencil-btn" onclick="togglePencil()">Lápiz: OFF</button>
                <button class="btn-small" id="hint-btn" onclick="giveStrategicHint()">Sugerencia (3)</button>
                <button class="btn-small" onclick="checkErrors()">Revisar</button>
                <button class="btn-small" onclick="askExit()" style="color:var(--accent)">Salir</button>
            </div>
            <div class="numpad">
                <button class="btn-small" onclick="handleInput(1)">1</button>
                <button class="btn-small" onclick="handleInput(2)">2</button>
                <button class="btn-small" onclick="handleInput(3)">3</button>
                <button class="btn-small" onclick="handleInput(4)">4</button>
                <button class="btn-small" onclick="handleInput(5)">5</button>
                <button class="btn-small" onclick="handleInput(6)">6</button>
                <button class="btn-small" onclick="handleInput(7)">7</button>
                <button class="btn-small" onclick="handleInput(8)">8</button>
                <button class="btn-small" onclick="handleInput(9)">9</button>
                <button class="btn-small" onclick="handleInput(null)">⌫</button>
            </div>
        </div>
    </div><!-- end container -->

    <!-- Modal Game Over -->
    <div class="modal-overlay" id="gameover-modal">
        <div class="modal-box">
            <h2>💀 Game Over</h2>
            <p>Alcanzaste el máximo de <strong>4 errores</strong>.<br>¡Inténtalo de nuevo!</p>
            <div class="modal-btn-group">
                <button class="btn-main" onclick="startNewGameFromModal()">NUEVA PARTIDA</button>
                <button class="btn-main btn-outline" onclick="exitFromModal()">VOLVER AL MENÚ</button>
            </div>
        </div>
    </div>

    <!-- Modal Salir con guardado -->
    <div class="modal-overlay" id="exit-modal">
        <div class="modal-box">
            <h2 style="color: var(--primary);">¿Salir?</h2>
            <p>Tu partida se guardará automáticamente.<br>Podrás reanudarla desde el menú.</p>
            <div class="modal-btn-group">
                <button class="btn-main" onclick="saveAndExit()">GUARDAR Y SALIR</button>
                <button class="btn-main btn-outline" onclick="closeExitModal()">SEGUIR JUGANDO</button>
            </div>
        </div>
    </div>

<script>
    // sd_v7: nueva estructura con errores, promedio y partida guardada
    let users = JSON.parse(localStorage.getItem('sd_v7')) || {};
    let currentUser = "";
    let currentDiff = "42";
    let gridData = [], solution = [], selected = null, isPencil = false, hints = 3;
    let timer, secs = 0;
    let errorCount = 0;
    const MAX_ERRORS = 4;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq = 440, duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function toggleNewUser(v) { document.getElementById('new-user-input').style.display = v === 'new' ? 'block' : 'none'; }

    function ensureUserStructure(name) {
        if (!users[name]) {
            users[name] = {
                "42": { wins: 0, best: Infinity, totalTime: 0, games: 0 },
                "34": { wins: 0, best: Infinity, totalTime: 0, games: 0 },
                "26": { wins: 0, best: Infinity, totalTime: 0, games: 0 }
            };
        }
        // Migrar perfil antiguo sin totalTime/games
        ["42","34","26"].forEach(d => {
            if (!users[name][d]) users[name][d] = { wins: 0, best: Infinity, totalTime: 0, games: 0 };
            if (users[name][d].totalTime === undefined) users[name][d].totalTime = 0;
            if (users[name][d].games === undefined) users[name][d].games = users[name][d].wins || 0;
        });
    }

    function saveUsers() { localStorage.setItem('sd_v7', JSON.stringify(users)); }

    // ─── PARTIDA GUARDADA ───
    function saveCurrentGame() {
        const saved = {
            user: currentUser, diff: currentDiff,
            gridData: gridData, solution: solution,
            secs: secs, hints: hints, errorCount: errorCount
        };
        localStorage.setItem('sd_savedGame', JSON.stringify(saved));
    }

    function loadSavedGame() {
        try { return JSON.parse(localStorage.getItem('sd_savedGame')); }
        catch(e) { return null; }
    }

    function clearSavedGame() { localStorage.removeItem('sd_savedGame'); }

    function checkResumeButton() {
        const saved = loadSavedGame();
        const section = document.getElementById('resume-section');
        const detail = document.getElementById('resume-detail');
        if (saved && saved.gridData && saved.user) {
            const diffLabel = { "42": "Fácil", "34": "Medio", "26": "Difícil" }[saved.diff] || "?";
            section.style.display = 'block';
            detail.innerText = `${saved.user} · ${diffLabel} · ${formatTime(saved.secs || 0)} · ${MAX_ERRORS - (saved.errorCount||0)} vidas`;
        } else {
            section.style.display = 'none';
        }
    }

    function resumeGame() {
        const saved = loadSavedGame();
        if (!saved) return;
        currentUser = saved.user;
        currentDiff = saved.diff;
        gridData = saved.gridData;
        solution = saved.solution;
        secs = saved.secs || 0;
        hints = saved.hints !== undefined ? saved.hints : 3;
        errorCount = saved.errorCount || 0;

        // Asegurar que el usuario existe
        ensureUserStructure(currentUser);
        saveUsers();

        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('display-name').innerText = currentUser;
        document.getElementById('timer').innerText = formatTime(secs);
        updateHintBtn();
        updateErrorDots();
        isPencil = false;
        selected = null;
        startTimer();
        render();
    }

    function initGame() {
        const sel = document.getElementById('user-select');
        if(!sel.value) return alert("Por favor, elige o crea un perfil.");
        
        currentDiff = document.getElementById('diff-select').value;
        
        if(sel.value === 'new') {
            const name = document.getElementById('new-user-input').value.trim();
            if(!name) return alert("Escribe un nombre.");
            ensureUserStructure(name);
            currentUser = name;
        } else {
            currentUser = sel.value;
            ensureUserStructure(currentUser);
        }
        
        saveUsers();
        clearSavedGame();
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('display-name').innerText = currentUser;
        startNewGame();
    }

    function showStats() {
        const filterEl = document.getElementById('stats-filter');
        const diff = filterEl ? filterEl.value : "42";
        const diffLabel = { "42": "Fácil", "34": "Medio", "26": "Difícil" }[diff];

        const body = document.querySelector('#stats-body tbody');
        body.innerHTML = '';

        const allEntries = Object.entries(users)
            .map(([name, data]) => {
                ensureUserStructure(name);
                return [name, data[diff]];
            })
            .filter(([_, d]) => d.wins > 0 || d.games > 0);

        // Stats globales de la dificultad
        const totalWins = allEntries.reduce((s,[_,d]) => s + d.wins, 0);
        const totalGames = allEntries.reduce((s,[_,d]) => s + d.games, 0);
        const bestTime = allEntries.reduce((b,[_,d]) => d.best < b ? d.best : b, Infinity);
        const avgTimeAll = allEntries.filter(([_,d]) => d.wins > 0)
            .reduce((s,[_,d]) => { return s + (d.wins > 0 ? d.totalTime / d.wins : 0); }, 0)
            / Math.max(allEntries.filter(([_,d]) => d.wins > 0).length, 1);

        document.getElementById('stats-summary').innerHTML = `
            <div class="stat-mini"><div class="sm-val">${totalWins}</div><div class="sm-label">VICTORIAS TOTALES</div></div>
            <div class="stat-mini"><div class="sm-val">${totalGames}</div><div class="sm-label">PARTIDAS JUGADAS</div></div>
            <div class="stat-mini"><div class="sm-val">${bestTime === Infinity ? '--:--' : formatTime(bestTime)}</div><div class="sm-label">MEJOR TIEMPO</div></div>
            <div class="stat-mini"><div class="sm-val">${isFinite(avgTimeAll) && avgTimeAll > 0 ? formatTime(Math.round(avgTimeAll)) : '--:--'}</div><div class="sm-label">TIEMPO PROMEDIO</div></div>
        `;

        const sorted = allEntries.sort((a,b) => b[1].wins - a[1].wins);

        if(sorted.length === 0) {
            body.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#666;">No hay datos en ${diffLabel}.</td></tr>`;
        } else {
            sorted.forEach(([name, d]) => {
                const avg = d.wins > 0 ? formatTime(Math.round(d.totalTime / d.wins)) : '--:--';
                body.innerHTML += `<tr>
                    <td>${name}</td>
                    <td>${d.wins}</td>
                    <td>${d.best === Infinity ? '--:--' : formatTime(d.best)}</td>
                    <td>${avg}</td>
                </tr>`;
            });
        }

        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('stats-screen').style.display = 'block';
    }

    function closeStats() {
        document.getElementById('stats-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
    }

    function startNewGame() {
        secs = 0; hints = 3; selected = null; errorCount = 0; isPencil = false;
        updateHintBtn();
        updateErrorDots();
        generateSudoku();
        startTimer();
        render();
    }

    function generateSudoku() {
        solution = Array(81).fill(0);
        const fill = (b) => {
            let i = b.indexOf(0); if (i === -1) return true;
            let ns = [1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
            for (let n of ns) { if (isSafe(b, i, n)) { b[i] = n; if (fill(b)) return true; b[i] = 0; } }
            return false;
        };
        fill(solution);
        let board = [...solution];
        let target = parseInt(currentDiff);
        let removed = 0, pos = Array.from({length:81}, (_,i)=>i).sort(()=>Math.random()-0.5);
        for (let p of pos) {
            if (removed >= (81 - target)) break;
            let temp = board[p]; board[p] = 0;
            let count = 0;
            const check = (g) => {
                if (count > 1) return;
                let i = g.indexOf(0); if (i === -1) { count++; return; }
                for (let n=1; n<=9; n++) if (isSafe(g, i, n)) { g[i] = n; check(g); g[i] = 0; }
            };
            check([...board]);
            if (count !== 1) board[p] = temp; else removed++;
        }
        gridData = board.map(v => ({ val: v, fixed: v !== 0, notes: [] }));
    }

    function isSafe(b, i, n) {
        let r = Math.floor(i/9), c = i%9;
        for (let x=0; x<9; x++) if (b[r*9+x] === n || b[x*9+c] === n) return false;
        let br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
        for (let x=0; x<3; x++) for (let y=0; y<3; y++) if (b[(br+x)*9+(bc+y)] === n) return false;
        return true;
    }

    function giveStrategicHint() {
        if (hints <= 0) return;
        let foundIdx = -1;
        for(let i=0; i<81; i++) {
            if(gridData[i].val === 0) {
                let options = [];
                for(let n=1; n<=9; n++) if(isSafe(gridData.map(c=>c.val), i, n)) options.push(n);
                if(options.length === 1) { foundIdx = i; break; }
            }
        }
        if(foundIdx === -1) {
            const empty = gridData.map((c,i) => c.val === 0 ? i : null).filter(v => v !== null);
            foundIdx = empty[Math.floor(Math.random()*empty.length)];
        }
        if(foundIdx !== -1) {
            playSound(600, 0.2);
            selected = foundIdx; render();
            const cells = document.querySelectorAll('.cell');
            cells[foundIdx].classList.add('hint-focus');
            document.getElementById('hint-msg').innerText = "Aquí solo hay un camino lógico.";
            hints--; updateHintBtn();
            setTimeout(() => cells[foundIdx].classList.remove('hint-focus'), 3000);
        }
    }

    // ─── HELPERS DE POSICIÓN ───
    function getRow(i) { return Math.floor(i / 9); }
    function getCol(i) { return i % 9; }
    function getBox(i) { return Math.floor(getRow(i) / 3) * 3 + Math.floor(getCol(i) / 3); }
    function sameGroup(a, b) { return getRow(a)===getRow(b) || getCol(a)===getCol(b) || getBox(a)===getBox(b); }

    // Indices de fila, columna y caja de un índice
    function groupIndices(i) {
        const r = getRow(i), c = getCol(i);
        const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
        const set = new Set();
        for(let x=0;x<9;x++) { set.add(r*9+x); set.add(x*9+c); }
        for(let x=0;x<3;x++) for(let y=0;y<3;y++) set.add((br+x)*9+(bc+y));
        return set;
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        const selVal = (selected !== null && gridData[selected]) ? gridData[selected].val : 0;
        const groupSet = selected !== null ? groupIndices(selected) : new Set();

        gridData.forEach((c, i) => {
            const div = document.createElement('div');
            let cls = 'cell';
            if (c.fixed) cls += ' fixed';
            if (selected === i) {
                cls += ' selected';
            } else if (groupSet.has(i)) {
                cls += ' same-group';
                if (selVal && selVal !== 0 && c.val === selVal) cls += ' same-number';
            } else if (selVal && selVal !== 0 && c.val === selVal) {
                cls += ' same-number';
            }
            div.className = cls;

            if (c.val) div.innerText = c.val;
            else if (c.notes.length > 0) {
                const nDiv = document.createElement('div'); nDiv.className = 'notes';
                for(let n=1; n<=9; n++) {
                    const s = document.createElement('span'); s.innerText = c.notes.includes(n) ? n : ''; nDiv.appendChild(s);
                }
                div.appendChild(nDiv);
            }
            div.onclick = () => { selected = i; render(); };
            grid.appendChild(div);
        });
    }

    function handleInput(n) {
        if (selected === null || gridData[selected].fixed) return;
        playSound(n ? 300 + (n * 30) : 200);
        if (n === null) { gridData[selected].val = 0; gridData[selected].notes = []; }
        else if (isPencil) {
            gridData[selected].val = 0;
            let ns = gridData[selected].notes;
            ns.includes(n) ? ns.splice(ns.indexOf(n), 1) : ns.push(n);
        } else {
            gridData[selected].val = n;
            gridData[selected].notes = [];

            if (n !== solution[selected]) {
                // Error
                errorCount++;
                updateErrorDots();
                playSound(150, 0.4);
                const cells = document.querySelectorAll('.cell');
                cells[selected].classList.add('error');
                setTimeout(() => { if(cells[selected]) cells[selected].classList.remove('error'); }, 1000);

                if (errorCount >= MAX_ERRORS) {
                    clearInterval(timer);
                    if (users[currentUser] && users[currentUser][currentDiff]) {
                        users[currentUser][currentDiff].games++;
                        saveUsers();
                    }
                    clearSavedGame();
                    setTimeout(() => {
                        document.getElementById('gameover-modal').classList.add('show');
                    }, 600);
                    render();
                    return;
                }
            } else {
                // Número correcto → borrar ese número en notas de celdas del mismo grupo
                erasePencilInGroup(selected, n);

                // Verificar si se completó algún grupo (fila, col, caja)
                checkGroupCompletion(selected);

                if (gridData.every((c,i) => c.val === solution[i])) {
                    win();
                    return;
                }
            }
        }
        if (currentUser) saveCurrentGame();
        render();
    }

    // Borra el número n de las notas de lápiz en todas las celdas del mismo grupo
    function erasePencilInGroup(idx, n) {
        groupIndices(idx).forEach(i => {
            if (i !== idx && gridData[i].notes.includes(n)) {
                gridData[i].notes.splice(gridData[i].notes.indexOf(n), 1);
            }
        });
    }

    // Verifica si la fila, columna o caja del índice quedan completas y correctas
    function checkGroupCompletion(idx) {
        const r = getRow(idx), c = getCol(idx);
        const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;

        const rowIdx  = Array.from({length:9}, (_,x) => r*9+x);
        const colIdx  = Array.from({length:9}, (_,x) => x*9+c);
        const boxIdx  = [];
        for(let x=0;x<3;x++) for(let y=0;y<3;y++) boxIdx.push((br+x)*9+(bc+y));

        [rowIdx, colIdx, boxIdx].forEach(group => {
            const complete = group.every(i => gridData[i].val !== 0 && gridData[i].val === solution[i]);
            if (complete) flashGroup(group);
        });
    }

    function flashGroup(indices) {
        // Pequeño delay para que render() ya haya pintado
        setTimeout(() => {
            const cells = document.querySelectorAll('.cell');
            indices.forEach((i, pos) => {
                setTimeout(() => {
                    if(cells[i]) {
                        cells[i].classList.remove('group-complete');
                        void cells[i].offsetWidth; // reflow para reiniciar animación
                        cells[i].classList.add('group-complete');
                        setTimeout(() => cells[i] && cells[i].classList.remove('group-complete'), 800);
                    }
                }, pos * 30);
            });
            playSound(440 + Math.random()*200, 0.15);
        }, 10);
    }

    function updateErrorDots() {
        for (let i = 1; i <= MAX_ERRORS; i++) {
            const dot = document.getElementById(`ed${i}`);
            if (dot) dot.classList.toggle('active', i <= errorCount);
        }
    }

    function togglePencil() {
        isPencil = !isPencil;
        document.getElementById('pencil-btn').classList.toggle('active', isPencil);
        document.getElementById('pencil-btn').innerText = `Lápiz: ${isPencil ? 'ON' : 'OFF'}`;
    }

    function checkErrors() {
        const cells = document.querySelectorAll('.cell');
        let err = 0;
        gridData.forEach((c, i) => {
            if (c.val !== 0 && !c.fixed && c.val !== solution[i]) {
                cells[i].classList.add('error'); err++;
                setTimeout(() => cells[i].classList.remove('error'), 1500);
            }
        });
        document.getElementById('hint-msg').innerText = err > 0 ? `Hay ${err} errores.` : "Vas por buen camino.";
        if(err > 0) playSound(150, 0.4);
    }

    function win() {
        clearInterval(timer);
        playSound(800, 0.6);
        clearSavedGame();
        
        ensureUserStructure(currentUser);
        const d = users[currentUser][currentDiff];
        d.wins++;
        d.games++;
        d.totalTime += secs;
        if (secs < d.best) d.best = secs;
        
        saveUsers();
        createCelebration();
        setTimeout(() => { alert("¡Victoria! 🎉"); exitGame(); }, 3000);
    }

    function createCelebration() {
        for(let i=0; i<60; i++) {
            const c = document.createElement('div'); c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = Math.random() > 0.5 ? 'var(--primary)' : 'var(--secondary)';
            document.body.appendChild(c);
            c.animate([{ top: '-10px', opacity: 1 }, { top: '100vh', opacity: 0 }], { duration: 2000 + Math.random()*2000 });
            setTimeout(() => c.remove(), 4000);
        }
    }

    function exitGame() {
        clearInterval(timer);
        clearSavedGame();
        document.getElementById('gameover-modal').classList.remove('show');
        document.getElementById('exit-modal').classList.remove('show');
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        updateUserSelect();
        checkResumeButton();
    }

    function askExit() {
        clearInterval(timer);
        document.getElementById('exit-modal').classList.add('show');
    }

    function saveAndExit() {
        saveCurrentGame();
        exitGame();
    }

    function closeExitModal() {
        document.getElementById('exit-modal').classList.remove('show');
        startTimer();
    }

    function startNewGameFromModal() {
        document.getElementById('gameover-modal').classList.remove('show');
        startNewGame();
    }

    function exitFromModal() {
        document.getElementById('gameover-modal').classList.remove('show');
        exitGame();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => { secs++; document.getElementById('timer').innerText = formatTime(secs); }, 1000);
    }

    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateHintBtn() { document.getElementById('hint-btn').innerText = `Sugerencia (${hints})`; }

    function updateUserSelect() {
        const sel = document.getElementById('user-select');
        sel.innerHTML = '<option value="" disabled selected>Selecciona un perfil...</option>';
        Object.keys(users).forEach(u => {
            const opt = document.createElement('option'); opt.value = u; opt.innerText = u;
            if(u === currentUser) opt.selected = true;
            sel.appendChild(opt);
        });
        const nOpt = document.createElement('option'); nOpt.value = 'new'; nOpt.innerText = '+ Crear nuevo perfil';
        sel.appendChild(nOpt);
    }

    window.onkeydown = (e) => {
        if (e.key >= 1 && e.key <= 9) handleInput(parseInt(e.key));
        if (e.key === 'Backspace') handleInput(null);
    };

    updateUserSelect();
    checkResumeButton();

    // Registro del Service Worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker registrado'))
                .catch((err) => console.log('Error SW:', err));
        });
    }
</script>
</body>
